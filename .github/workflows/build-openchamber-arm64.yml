name: Build OpenChamber ARM64

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: Build even when the upstream tag is not newer than the latest release
        required: false
        type: boolean
        default: false
      tag_override:
        description: Optional specific upstream tag to build (e.g. v1.13.9)
        required: false
        type: string
        default: ""
      release_tag_override:
        description: Optional release tag to publish (e.g. v1.13.9.1). Defaults to the upstream tag.
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 */6 * * *"

permissions:
  actions: read
  contents: write

jobs:
  check:
    name: Check Upstream Tag
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.resolve.outputs.should_build }}
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: previous_run
        name: Stop Scheduled Runs After Failure
        if: github.event_name == 'schedule'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $runs = gh run list `
            --repo $env:GITHUB_REPOSITORY `
            --workflow $env:GITHUB_WORKFLOW `
            --status completed `
            --limit 100 `
            --json conclusion,databaseId,url `
            | ConvertFrom-Json

          foreach ($run in $runs) {
            $jobs = gh run view $run.databaseId `
              --repo $env:GITHUB_REPOSITORY `
              --json jobs `
              | ConvertFrom-Json

            $buildJob = $jobs.jobs | Where-Object { $_.name -eq "Build And Release" } | Select-Object -First 1
            if (-not $buildJob -or $buildJob.conclusion -eq "skipped") {
              continue
            }

            if ($buildJob.conclusion -eq "failure") {
              "continue=false" >> $env:GITHUB_OUTPUT
              "Latest completed build job failed: $($run.url)" >> $env:GITHUB_STEP_SUMMARY
              exit 0
            }

            break
          }

          "continue=true" >> $env:GITHUB_OUTPUT

      - uses: actions/checkout@v6
        if: steps.previous_run.outputs.continue != 'false'

      - id: resolve
        name: Resolve Latest Tag
        if: steps.previous_run.outputs.continue != 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_override || '' }}
          RELEASE_TAG_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag_override || '' }}
        run: |
          .\scripts\Get-OpenChamberLatestTag.ps1 -Repo $env:GITHUB_REPOSITORY -TagOverride $env:TAG_OVERRIDE -ReleaseTagOverride $env:RELEASE_TAG_OVERRIDE

  build:
    name: Build And Release
    needs: check
    if: needs.check.outputs.should_build == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.force_build || inputs.tag_override != '' || inputs.release_tag_override != ''))
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install NSIS
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install nsis --version 3.12 --yes --no-progress
          $nsisFolder = "C:\Program Files (x86)\NSIS"
          if (-not (Test-Path (Join-Path $nsisFolder "makensis.exe"))) {
            $nsisFolder = "C:\Program Files\NSIS"
          }
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $nsisFolder
          & (Join-Path $nsisFolder "makensis.exe") /VERSION

      - name: Clone OpenChamber
        shell: pwsh
        env:
          UPSTREAM_TAG: ${{ needs.check.outputs.upstream_tag }}
        run: |
          $ErrorActionPreference = "Stop"
          git clone --branch $env:UPSTREAM_TAG --depth 1 https://github.com/openchamber/openchamber.git openchamber

      - name: Install Dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Push-Location openchamber
          bun install --frozen-lockfile
          Pop-Location

      - name: Apply ARM64 Patches
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $clonePath = "openchamber"

          # Patch 1: prepare-opencode-cli.mjs -- force x64-baseline on win32/arm64
          $prepareCliPath = Join-Path $clonePath "packages/electron/scripts/prepare-opencode-cli.mjs"
          $c = Get-Content $prepareCliPath -Raw
          $old = "if (arch === 'arm64') return { name: 'opencode-windows-arm64.zip', binary: 'opencode.exe' };"
          $new = "if (arch === 'arm64') return { name: 'opencode-windows-x64-baseline.zip', binary: 'opencode.exe' };"
          if ($c.Contains($old)) {
            $c = $c.Replace($old, $new)
            Set-Content $prepareCliPath $c -NoNewline
            Write-Host "[OK] Patched prepare-opencode-cli.mjs (arm64 -> x64-baseline)"
          }

          # Patch 2: node-pty binding.gyp -- disable Spectre mitigation
          $nodePtyDir = Get-ChildItem -Path (Join-Path $clonePath "node_modules/.bun") -Directory -Filter "node-pty@*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nodePtyDir) {
            $bg = Join-Path $nodePtyDir.FullName "node_modules/node-pty/binding.gyp"
            if (Test-Path $bg) {
              $c = Get-Content $bg -Raw
              $old = "'SpectreMitigation': 'Spectre'"
              $new = "'SpectreMitigation': 'false'"
              if ($c.Contains($old)) {
                $c = $c.Replace($old, $new)
                Set-Content $bg $c -NoNewline
                Write-Host "[OK] Patched node-pty/binding.gyp (Spectre mitigation disabled)"
              }
            }
          }

          # Patch 3: Disable OpenCode upgrade API -- return no-op for upgrade and upgrade-status
          $routesPath = Join-Path $clonePath "packages/web/server/lib/opencode/routes.js"
          if (Test-Path $routesPath) {
            $c = Get-Content $routesPath -Raw
            $oldUpgrade = "app.post('/api/opencode/upgrade', async (req, res) => {"
            $newUpgrade = "app.post('/api/opencode/upgrade', async (req, res) => { return res.status(409).json({ success: false, error: 'OpenCode upgrade is disabled in this build.' });"
            $oldStatus = "app.get('/api/opencode/upgrade-status', async (_req, res) => {"
            $newStatus = "app.get('/api/opencode/upgrade-status', async (_req, res) => { return res.json({ available: false, currentVersion: null, latestVersion: null, source: 'bundled' });"
            $changed = $false
            if ($c.Contains($oldUpgrade) -and -not $c.Contains($newUpgrade)) {
              $c = $c.Replace($oldUpgrade, $newUpgrade); $changed = $true
            }
            if ($c.Contains($oldStatus) -and -not $c.Contains($newStatus)) {
              $c = $c.Replace($oldStatus, $newStatus); $changed = $true
            }
            if ($changed) {
              Set-Content $routesPath $c -NoNewline
              Write-Host "[OK] Patched routes.js (upgrade API disabled)"
            }
          }

          # Patch 4: Default showOpenCodeUpdateNotifications to false
          $storePath = Join-Path $clonePath "packages/ui/src/stores/useUIStore.ts"
          if (Test-Path $storePath) {
            $c = Get-Content $storePath -Raw
            $old = "showOpenCodeUpdateNotifications: true,"
            $new = "showOpenCodeUpdateNotifications: false,"
            if ($c.Contains($old)) {
              $c = $c.Replace($old, $new)
              Set-Content $storePath $c -NoNewline
              Write-Host "[OK] Patched useUIStore.ts (update notifications default off)"
            }
          }

          # Patch 5: Hide update notification checkbox from OpenCode CLI settings
          $settingsPath = Join-Path $clonePath "packages/ui/src/components/sections/openchamber/OpenCodeCliSettings.tsx"
          if (Test-Path $settingsPath) {
            $c = Get-Content $settingsPath -Raw
            $oldCheckboxStart = '        <label data-settings-item="sessions.opencode-update-notifications"'
            $oldCheckboxEnd = '        </label>'
            $startIdx = $c.IndexOf($oldCheckboxStart)
            if ($startIdx -ge 0) {
              $endIdx = $c.IndexOf($oldCheckboxEnd, $startIdx)
              if ($endIdx -ge 0) {
                $endIdx += $oldCheckboxEnd.Length
                $c = $c.Substring(0, $startIdx) + $c.Substring($endIdx)
                Set-Content $settingsPath $c -NoNewline
                Write-Host "[OK] Patched OpenCodeCliSettings.tsx (hidden update notification checkbox)"
              }
            }
          }

      - name: Build Web Assets
        working-directory: openchamber/packages/electron
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          bun run build:web-assets

      - name: Bundle Main Process
        working-directory: openchamber/packages/electron
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          bun run bundle:main

      - name: Rebuild Native Modules
        working-directory: openchamber/packages/electron
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:ELECTRON_BUILDER_ARCH = "arm64"
          node ./scripts/rebuild-native.mjs

      - name: Build ARM64 Installer
        working-directory: openchamber/packages/electron
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          node ./scripts/package.mjs --win --arm64 --publish=never

      - name: Collect Output
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $exe = Get-ChildItem -Path openchamber/packages/electron/dist -Filter "OpenChamber-*-win-arm64.exe" | Select-Object -First 1
          if (-not $exe) { throw "Installer .exe not found" }
          Copy-Item $exe.FullName -Destination (Join-Path "dist" $exe.Name) -Force
          Write-Host "Installer: $($exe.Name)"
          Write-Host "Size: $([math]::Round($exe.Length / 1MB, 1)) MB"

      - name: Archive Dist
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path .\dist -Filter "OpenChamber-*-win-arm64.exe" | Select-Object -First 1
          if (-not $exe) { throw "Installer .exe not found in dist" }
          7z a dist.7z $exe.FullName

      - name: Generate Scoop Manifest
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath .\dist.7z).Hash.ToLowerInvariant()
          $url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/dist.7z"
          New-Item -ItemType Directory -Path .\bucket -Force | Out-Null
          $manifest = [ordered]@{
            version = $env:VERSION
            description = "Unofficial Windows ARM64 build of OpenChamber."
            homepage = "https://github.com/$env:GITHUB_REPOSITORY"
            license = "MIT"
            depends = "7zip"
            architecture = [ordered]@{
              arm64 = [ordered]@{
                url = $url
                hash = $hash
              }
            }
            installer = [ordered]@{
              script = @(
              '$exe = Get-ChildItem -LiteralPath $dir -Filter "OpenChamber-*-win-arm64.exe" | Select-Object -First 1'
              'if (-not $exe) { throw "OpenChamber ARM64 installer not found." }'
              'Write-Host "Installing OpenChamber ARM64..."'
              'Start-Process -FilePath $exe.FullName -ArgumentList "/S" -Wait'
              )
            }
            notes = "This is an unofficial ARM64 build. OpenChamber is a desktop AI coding agent."
          }

          $json = $manifest | ConvertTo-Json -Depth 8
          $json | Set-Content -LiteralPath .\openchamber-arm64.json -Encoding UTF8
          $json | Set-Content -LiteralPath .\bucket\openchamber-arm64.json -Encoding UTF8

      - uses: actions/upload-artifact@v4
        with:
          name: openchamber-arm64-${{ needs.check.outputs.release_tag }}
          path: |
            dist.7z
            openchamber-arm64.json

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
          UPSTREAM_TAG: ${{ needs.check.outputs.upstream_tag }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          $notes = @"
          Unofficial Windows ARM64 build of OpenChamber $env:VERSION.

          Source: openchamber/openchamber $env:UPSTREAM_TAG
          Built on GitHub Actions (windows-11-arm runner).
          "@

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag
          }

          gh release create $env:RELEASE_TAG dist.7z openchamber-arm64.json --title $env:RELEASE_TAG --notes $notes

      - name: Commit Scoop Manifest
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/openchamber-arm64.json
          git commit -m "Update Scoop manifest for OpenChamber $env:RELEASE_TAG"
          git push